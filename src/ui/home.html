<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f1115;
            --accent: #818CF8;
            --text-main: #f3f4f6;
            --text-dim: #9ca3af;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            text-align: center;
            max-width: 600px;
            width: 90%;
            animation: fadeIn 1.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-size: 3rem;
            font-weight: 600;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, #fff 0%, #818CF8 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .search-container {
            position: relative;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .search-container:focus-within {
            border-color: var(--accent);
            box-shadow: 0 15px 50px rgba(129, 140, 248, 0.15), 0 0 0 4px rgba(129, 140, 248, 0.1);
            transform: translateY(-2px);
        }

        .search-icon {
            width: 20px;
            height: 20px;
            color: var(--text-dim);
            margin-right: 12px;
        }

        input {
            background: transparent;
            border: none;
            color: inherit;
            font-size: 1.1rem;
            width: 100%;
            outline: none;
            font-family: inherit;
        }

        input::placeholder {
            color: var(--text-dim);
        }

        .shortcuts {
            margin-top: 3rem;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
        }

        .shortcut {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--text-dim);
            transition: all 0.2s;
            cursor: pointer;
        }

        .shortcut:hover {
            color: var(--text-main);
            transform: translateY(-4px);
        }

        .shortcut-icon {
            width: 48px;
            height: 48px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: all 0.2s;
        }

        .shortcut:hover .shortcut-icon {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent);
            color: var(--accent);
        }

        .shortcut-label {
            font-size: 0.85rem;
            font-weight: 500;
        }

        .clock {
            position: absolute;
            top: 40px;
            right: 40px;
            font-size: 1.5rem;
            font-weight: 500;
            color: var(--text-dim);
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="clock" id="clock">12:00</div>

    <div class="container">
        <div class="logo">Zenith</div>
        
        <form action="https://www.google.com/search" method="GET">
            <div class="search-container">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" name="q" placeholder="Search the web..." autofocus autocomplete="off">
            </div>
        </form>

        <div class="shortcuts">
            <a class="shortcut" href="https://github.com">
                <div class="shortcut-icon">GH</div>
                <div class="shortcut-label">GitHub</div>
            </a>
            <a class="shortcut" href="https://youtube.com">
                <div class="shortcut-icon">YT</div>
                <div class="shortcut-label">YouTube</div>
            </a>
            <a class="shortcut" href="https://reddit.com">
                <div class="shortcut-icon">RD</div>
                <div class="shortcut-label">Reddit</div>
            </a>
            <a class="shortcut" href="https://twitter.com">
                <div class="shortcut-icon">TW</div>
                <div class="shortcut-label">Twitter</div>
            </a>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>

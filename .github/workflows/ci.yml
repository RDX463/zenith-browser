name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: bun install

      - name: Lint frontend
        working-directory: ./frontend
        run: bun run lint

      - name: Build frontend
        working-directory: ./frontend
        run: bun run build

      - name: Run frontend tests
        working-directory: ./frontend
        run: bun run test --run

  backend:
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev libglib2.0-dev libcairo-gobject2 libpango1.0-dev libatk1.0-dev libgdk-pixbuf2.0-dev

      - name: Cache Cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache Cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache Cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Format check
        run: cargo fmt -- --check

      - name: Clippy check
        run: cargo clippy -- -D warnings

      - name: Build backend
        run: cargo build --release

      - name: Run backend tests
        run: cargo test --release

  macos-build:
    runs-on: macos-latest
    needs: [frontend, backend]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Build frontend
        working-directory: ./frontend
        run: bun install && bun run build

      - name: Build macOS binary
        run: cargo build --release

      - name: Create macOS artifact
        run: |
          mkdir -p artifacts
          cp target/release/zenith-browser artifacts/zenith-browser-macos
          ls -lh artifacts/

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v3
        with:
          name: zenith-macos
          path: artifacts/zenith-browser-macos
